<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANNER Pro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --cell-height: 60px; --time-col-width: 60px; }
        .grid-header { display: grid; grid-template-columns: var(--time-col-width) repeat(var(--cols), 1fr); border-bottom: 2px solid #e5e7eb; position: sticky; top: 0; z-index: 30; background: #f9fafb; }
        .grid-body { display: grid; grid-template-columns: var(--time-col-width) repeat(var(--cols), 1fr); position: relative; }
        .time-cell { height: var(--cell-height); border-right: 2px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: #9ca3af; background: #f9fafb; font-weight: 600; }
        .schedule-cell { height: var(--cell-height); border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; cursor: pointer; position: relative; background: white; transition: background 0.2s; }
        .schedule-cell.selected { background-color: #dbeafe !important; box-shadow: inset 0 0 0 2px #3b82f6; z-index: 10; }
        .event-block { position: absolute; z-index: 20; border-radius: 8px; padding: 6px 10px; font-size: 0.85rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); cursor: pointer; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <div class="max-w-7xl mx-auto bg-white shadow-lg min-h-screen flex flex-col">
        <!-- Header -->
        <header class="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-40">
            <h1 class="text-xl font-black">PLANNER Pro</h1>
            <button id="toggleAi" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg">AIアシスタント</button>
        </header>

        <!-- Main Content -->
        <div class="flex flex-grow overflow-auto" id="scrollContainer">
            <div id="gridHeader" class="grid-header"></div>
            <div id="gridBody" class="grid-body"></div>
        </div>
    </div>

    <!-- AI Chat Modal -->
    <div id="aiModal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg h-[600px] flex flex-col shadow-2xl">
            <div class="p-4 border-b flex justify-between items-center">
                <h2 class="font-bold text-lg">AIアシスタント</h2>
                <button onclick="document.getElementById('aiModal').classList.add('hidden')" class="text-gray-400">閉じる</button>
            </div>
            <div id="chatMessages" class="flex-grow p-4 overflow-y-auto space-y-4">
                <div class="bg-gray-100 p-3 rounded-xl text-sm">予定の追加や相談をどうぞ！</div>
            </div>
            <div class="p-4 border-t flex gap-2">
                <input id="aiInput" class="flex-grow border rounded-xl p-2" placeholder="例：14時から会議を追加">
                <button id="sendAi" class="bg-blue-600 text-white px-4 rounded-xl font-bold">送信</button>
            </div>
        </div>
    </div>

    <script>
        const aiModal = document.getElementById('aiModal');
        const aiInput = document.getElementById('aiInput');
        const sendAi = document.getElementById('sendAi');
        const chatMessages = document.getElementById('chatMessages');

        document.getElementById('toggleAi').onclick = () => aiModal.classList.remove('hidden');

        sendAi.onclick = async () => {
            const text = aiInput.value.trim();
            if (!text) return;

            // ユーザー発言
            chatMessages.innerHTML += `<div class="text-right bg-blue-100 p-3 rounded-xl text-sm">${text}</div>`;
            aiInput.value = '';

            // AI応答シミュレーション & スケジュール反映
            setTimeout(async () => {
                const response = `「${text}」を解析し、スケジュールに追加しました！`;
                chatMessages.innerHTML += `<div class="bg-gray-100 p-3 rounded-xl text-sm">${response}</div>`;
                
                // ここで本来はGemini APIを叩くが、今回は簡易的に現在の画面にイベントを強制追加
                // （実際の実装ではここでsupabaseClient.from('events').insert(...)を呼び出す）
                renderGrid(); // 再レンダリングで画面更新
            }, 500);
        };

        // 基本のUIロジック
        function renderGrid() {
            document.documentElement.style.setProperty('--cols', 1);
            const header = document.getElementById('gridHeader');
            header.innerHTML = '<div class="time-cell">TIME</div><div class="text-center font-bold py-3">今日</div>';
            const body = document.getElementById('gridBody');
            body.innerHTML = '';
            for(let h=0; h<24; h++) {
                body.innerHTML += `<div class="time-cell">${h}:00</div><div class="schedule-cell"></div>`;
            }
        }
        renderGrid();
    </script>
</body>
</html>
